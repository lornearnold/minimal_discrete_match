<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MDM storyboard</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/black.css">

  <style>
    /* Background videos: contain (don't crop) and centered. */
    .reveal .slide-background-content video {
      object-fit: contain !important;
      width: 100% !important;
      height: 100% !important;
      background: #000;
    }
    /* Slides are empty (video is the background) — no padding ghosts. */
    .reveal .slides section { padding: 0 !important; }
    /* Hide reveal's progress bar + controls in true fullscreen for clean playback. */
    :fullscreen .reveal .progress,
    :fullscreen .reveal .controls,
    :fullscreen .reveal .slide-number { display: none !important; }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">

      <section
        data-background-color="#000"
        data-background-video="../media/videos/sieve_stack/1080p30/SieveStack.mp4"
        data-background-video-muted="true"
      ></section>

      <section
        data-background-color="#000"
        data-background-video="../media/videos/pile_to_gsd/1080p30/PileToGSD.mp4"
        data-background-video-muted="true"
      ></section>

      <section
        data-background-color="#000"
        data-background-video="../media/videos/continuum_reveal/1080p30/DefiningG.mp4"
        data-background-video-muted="true"
      ></section>

      <section
        data-background-color="#000"
        data-background-video="../media/videos/defining_s/1080p30/DefiningS.mp4"
        data-background-video-muted="true"
      ></section>

      <section
        data-background-color="#000"
        data-background-video="../media/videos/ratios/1080p30/MassRatios.mp4"
        data-background-video-muted="true"
      ></section>

      <section
        data-background-color="#000"
        data-background-video="../media/videos/ratios/1080p30/VolumeRatios.mp4"
        data-background-video-muted="true"
      ></section>

      <section
        data-background-color="#000"
        data-background-video="../media/videos/quantity_ratio/1080p30/QuantityRatio.mp4"
        data-background-video-muted="true"
      ></section>

      <section
        data-background-color="#000"
        data-background-video="../media/videos/rounding/1080p30/ReducingError.mp4"
        data-background-video-muted="true"
      ></section>

      <section
        data-background-color="#000"
        data-background-video="../media/videos/spanned_integer/1080p30/SpannedIntegerCombined.mp4"
        data-background-video-muted="true"
      ></section>

      <section
        data-background-color="#000"
        data-background-video="../media/videos/verification/1080p30/Verification.mp4"
        data-background-video-muted="true"
      ></section>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
  <script>
    const deck = new Reveal({
      hash: true,
      controls: true,
      progress: true,
      slideNumber: false,
      transition: "none",
      // Don't auto-advance — user controls timing per scene.
      autoSlide: 0,
      autoSlideStoppable: true,
      // Let slides fill the viewport; backgrounds (videos) get the room.
      width: "100%",
      height: "100%",
      margin: 0,
      minScale: 1,
      maxScale: 1,
    });
    deck.initialize();

    // 'r' restarts the current slide's background video from frame 0.
    document.addEventListener("keydown", (ev) => {
      if (ev.key !== "r" && ev.key !== "R") return;
      const bg = deck.getCurrentSlide()?.slideBackgroundElement;
      const v = bg?.querySelector("video");
      if (v) {
        v.currentTime = 0;
        v.play();
      }
    });
  </script>
</body>
</html>
